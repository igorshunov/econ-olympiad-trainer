<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Тренировка — EconTrainer</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header" id="header"></header>
  <main>
    <div class="task-page">
      <div>
        <div class="card" id="task-card">
          <div class="task-meta">
            <span class="tag" id="topic-tag"></span>
            <span class="tag" id="diff-tag"></span>
            <span class="tag" id="mastery-tag"></span>
            <span class="tag" id="source-tag"></span>
          </div>
          <div class="task-text" id="task-text"></div>
          <div id="solution-box"></div>
          <div style="margin-top:18px;display:flex;gap:8px;flex-wrap:wrap">
            <button id="reveal-btn">Показать разбор</button>
            <button class="btn-secondary" id="skip-btn">Пропустить →</button>
          </div>
        </div>

        <div class="card" id="feedback-card" style="display:none">
          <h3>Как для вас была эта задача?</h3>
          <p class="muted">Решали на бумаге. Оцените сами — это настроит подбор следующих задач.</p>
          <div class="feedback-buttons">
            <button class="btn-success" data-action="solved">✓ Решил уверенно</button>
            <button class="btn-warn" data-action="too_easy">↑ Слишком просто</button>
            <button class="btn-danger" data-action="failed">✗ Не смог решить</button>
            <button class="btn-secondary" data-action="too_hard">↓ Слишком сложно</button>
          </div>
        </div>
      </div>

      <aside>
        <div class="card">
          <h3>Подсказки по этой теме</h3>
          <p class="muted" id="prereq-hint"></p>
          <p class="muted" id="downstream-hint"></p>
        </div>
        <div class="card">
          <h3>Сессия</h3>
          <p class="muted" id="session-stats"></p>
        </div>
      </aside>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
  <script src="data/topics.js"></script>
  <script src="data/tasks.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/ui.js"></script>
  <script>
  (async () => {
    const user = await UI.requireAuth();
    if (!user) return;
    await UI.renderHeader('task', user);
    await Engine.preload();

    let currentTask = null;
    let currentTopic = null;
    let revealed = false;

    async function loadNext(prefer) {
      const chosen = sessionStorage.getItem('next_topic');
      let task, topic;
      if (chosen) {
        sessionStorage.removeItem('next_topic');
        topic = Engine.topicById(chosen);
        const hist = await Storage.getHistory();
        const recent = hist.slice(-5).map(h => h.taskId);
        task = Engine.pickTask(chosen, recent);
      } else {
        ({ topic, task } = await Engine.nextRecommendation(prefer));
      }
      currentTask = task;
      currentTopic = topic;
      revealed = false;
      await renderTask();
    }

    async function renderTask() {
      document.getElementById('topic-tag').textContent = currentTopic.name;
      document.getElementById('diff-tag').textContent = 'Сложность ' + currentTask.difficulty + '/5';
      document.getElementById('diff-tag').className = 'tag difficulty-' + currentTask.difficulty;
      const m = Engine.getMastery(currentTopic.id);
      document.getElementById('mastery-tag').textContent = 'Mastery: ' + Math.round(m*100) + '%';

      // Source tag
      const srcTag = document.getElementById('source-tag');
      if (currentTask.source) {
        const s = currentTask.source;
        srcTag.textContent = `${s.olympiad}-${s.year}, ${s.stage}${s.grade ? ', ' + s.grade + ' кл.' : ''}`;
        srcTag.style.display = '';
      } else {
        srcTag.style.display = 'none';
      }

      document.getElementById('task-text').textContent = currentTask.text;
      document.getElementById('solution-box').innerHTML = '';
      document.getElementById('feedback-card').style.display = 'none';
      document.getElementById('reveal-btn').disabled = false;
      document.getElementById('reveal-btn').textContent = 'Показать разбор';

      const prereqs = Engine.upstream(currentTopic.id).map(p => Engine.topicById(p).name);
      document.getElementById('prereq-hint').textContent = prereqs.length
        ? "Эта тема опирается на: " + prereqs.join(", ")
        : "Это базовая тема, без пререквизитов.";
      const downs = Engine.downstream(currentTopic.id).map(d => Engine.topicById(d).name);
      document.getElementById('downstream-hint').textContent = downs.length
        ? "Дальше она ведёт к: " + downs.join(", ")
        : "Это узловая тема (нет downstream).";

      const h = await Storage.getHistory();
      const today = h.filter(x => Date.now() - x.ts < 86400000);
      document.getElementById('session-stats').textContent =
        "Решено за 24ч: " + today.length + " задач(и)";
    }

    document.getElementById('reveal-btn').onclick = () => {
      if (revealed) { loadNext(); return; }
      revealed = true;
      const box = document.getElementById('solution-box');
      const ans = currentTask.answer
        ? `<div class="explanation"><b>Ответ:</b> ${escapeHtml(currentTask.answer)}</div>`
        : '';
      const sol = currentTask.solution
        ? `<div class="explanation" style="background:#0f3a1f30;border-left-color:#10b981;white-space:pre-wrap">${escapeHtml(currentTask.solution)}</div>`
        : '';
      box.innerHTML = ans + sol;
      document.getElementById('reveal-btn').textContent = 'Следующая задача →';
      document.getElementById('feedback-card').style.display = 'block';
    };

    document.getElementById('skip-btn').onclick = () => loadNext();

    document.querySelectorAll('#feedback-card button').forEach(btn => {
      btn.onclick = async () => {
        const action = btn.dataset.action;
        const prefer = await Engine.recordAttempt(
          currentTask.id, currentTopic.id, action, null);
        UI.toast('Прогресс сохранён');
        await loadNext(prefer);
      };
    });

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    await loadNext();
  })();
  </script>
</body>
</html>
