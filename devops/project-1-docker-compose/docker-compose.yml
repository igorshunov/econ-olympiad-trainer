# EconTrainer — production-like docker-compose с фронтом + БД + reverse-proxy.
# Демонстрирует упаковку приложения по принципам 12-factor:
#   - конфигурация через env (см. .env / .env.example)
#   - явные dependencies/healthchecks
#   - все компоненты воспроизводимы из image, никаких host-зависимостей.
services:
  econtrainer:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/igorshunov/econtrainer:${TAG:-latest}
    container_name: econtrainer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks: [internal]
    expose: ["80"]

  db:
    image: postgres:16-alpine
    container_name: econtrainer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-econtrainer}
      POSTGRES_USER:     ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?postgres password required}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app}"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks: [internal]

  proxy:
    image: caddy:2.10-alpine
    container_name: econtrainer-proxy
    restart: unless-stopped
    depends_on:
      - econtrainer
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  db_data:
  caddy_data:
  caddy_config:
