<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Тренировка — EconTrainer</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header" id="header"></header>
  <main>
    <div class="task-page">
      <div>
        <div class="card" id="task-card">
          <div class="task-meta">
            <span class="tag" id="topic-tag"></span>
            <span class="tag" id="diff-tag"></span>
            <span class="tag" id="mastery-tag"></span>
          </div>
          <div class="task-text" id="task-text"></div>
          <ul class="options" id="options"></ul>
          <div id="explanation-box"></div>
          <div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">
            <button id="submit-btn">Проверить ответ</button>
            <button class="btn-secondary" id="skip-btn">Пропустить →</button>
          </div>
        </div>

        <div class="card" id="feedback-card" style="display:none">
          <h3>Как для вас была эта задача?</h3>
          <p class="muted">Ваш ответ настроит подбор следующих задач.</p>
          <div class="feedback-buttons">
            <button class="btn-success" data-action="solved">✓ Решил уверенно</button>
            <button class="btn-warn" data-action="too_easy">↑ Слишком просто</button>
            <button class="btn-danger" data-action="failed">✗ Не смог решить</button>
            <button class="btn-secondary" data-action="too_hard">↓ Слишком сложно</button>
          </div>
        </div>
      </div>

      <aside>
        <div class="card">
          <h3>Подсказки по этой теме</h3>
          <p class="muted" id="prereq-hint"></p>
          <p class="muted" id="downstream-hint"></p>
        </div>
        <div class="card">
          <h3>Сессия</h3>
          <p class="muted" id="session-stats"></p>
        </div>
      </aside>
    </div>
  </main>

  <script src="data/topics.js"></script>
  <script src="data/tasks.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/ui.js"></script>
  <script>
    UI.requireAuth();
    UI.renderHeader('task');

    let currentTask = null;
    let currentTopic = null;
    let selected = -1;
    let answered = false;

    function loadNext(prefer) {
      // Если выбрана тема из дашборда — использовать её один раз
      const chosen = sessionStorage.getItem('next_topic');
      let task, topic;
      if (chosen) {
        sessionStorage.removeItem('next_topic');
        topic = Engine.topicById(chosen);
        const recent = Storage.getHistory().slice(-5).map(h => h.taskId);
        task = Engine.pickTask(chosen, recent);
      } else {
        ({ topic, task } = Engine.nextRecommendation(prefer));
      }
      currentTask = task;
      currentTopic = topic;
      selected = -1;
      answered = false;
      renderTask();
    }

    function renderTask() {
      document.getElementById('topic-tag').textContent = currentTopic.name;
      document.getElementById('diff-tag').textContent = 'Сложность ' + currentTask.difficulty + '/5';
      document.getElementById('diff-tag').className = 'tag difficulty-' + currentTask.difficulty;
      const m = Engine.getMastery(currentTopic.id);
      document.getElementById('mastery-tag').textContent = 'Mastery: ' + Math.round(m*100) + '%';

      document.getElementById('task-text').textContent = currentTask.text;
      const ul = document.getElementById('options');
      ul.innerHTML = '';
      currentTask.options.forEach((opt, i) => {
        const li = document.createElement('li');
        li.textContent = opt;
        li.onclick = () => {
          if (answered) return;
          [...ul.children].forEach(c => c.classList.remove('selected'));
          li.classList.add('selected');
          selected = i;
        };
        ul.appendChild(li);
      });
      document.getElementById('explanation-box').innerHTML = '';
      document.getElementById('feedback-card').style.display = 'none';
      document.getElementById('submit-btn').disabled = false;
      document.getElementById('submit-btn').textContent = 'Проверить ответ';

      // hints
      const prereqs = Engine.upstream(currentTopic.id).map(p => Engine.topicById(p).name);
      document.getElementById('prereq-hint').textContent = prereqs.length
        ? "Эта тема опирается на: " + prereqs.join(", ")
        : "Это базовая тема, без пререквизитов.";
      const downs = Engine.downstream(currentTopic.id).map(d => Engine.topicById(d).name);
      document.getElementById('downstream-hint').textContent = downs.length
        ? "Дальше она ведёт к: " + downs.join(", ")
        : "Это узловая тема (нет downstream).";

      // session stats
      const h = Storage.getHistory();
      const today = h.filter(x => Date.now() - x.ts < 86400000);
      document.getElementById('session-stats').textContent =
        "Решено за 24ч: " + today.length + " задач(и)";
    }

    document.getElementById('submit-btn').onclick = () => {
      if (answered) { loadNext(); return; }
      if (selected < 0) { UI.toast('Выберите вариант ответа'); return; }
      answered = true;
      const ul = document.getElementById('options');
      const correctIdx = currentTask.answer;
      [...ul.children].forEach((li, i) => {
        if (i === correctIdx) li.classList.add('correct');
        else if (i === selected) li.classList.add('wrong');
      });
      const isCorrect = selected === correctIdx;
      const exp = document.getElementById('explanation-box');
      exp.innerHTML = `<div class="explanation">
        <b>${isCorrect ? '✓ Верно!' : '✗ Не совсем. Правильный ответ: ' + (correctIdx+1)}</b><br>
        ${currentTask.explanation}
      </div>`;
      document.getElementById('submit-btn').textContent = 'Следующая задача →';
      document.getElementById('feedback-card').style.display = 'block';
      // Запомним правильность для feedback
      window._wasCorrect = isCorrect;
    };

    document.getElementById('skip-btn').onclick = () => loadNext();

    document.querySelectorAll('#feedback-card button').forEach(btn => {
      btn.onclick = () => {
        const action = btn.dataset.action;
        const prefer = Engine.recordAttempt(currentTask.id, currentTopic.id, action, window._wasCorrect);
        UI.toast('Прогресс сохранён');
        loadNext(prefer);
      };
    });

    loadNext();
  </script>
</body>
</html>
